[mypy]
python_version = 3.10
warn_redundant_casts = true
warn_unused_ignores = true

# apt_pkg / apt_inst are C extensions from python3-apt. Their bundled type
# stubs are incomplete, and the package is awkward to install in CI, so we
# treat them as untyped (Any) regardless of whether they happen to be present.
[mypy-apt_pkg]
ignore_missing_imports = true
follow_imports = skip
follow_imports_for_stubs = true

[mypy-apt_inst]
ignore_missing_imports = true
follow_imports = skip
follow_imports_for_stubs = true

# pysequoia is imported lazily (only for the 'ingest' command) and ships no
# type stubs.
[mypy-pysequoia]
ignore_missing_imports = true

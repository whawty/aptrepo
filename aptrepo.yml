# aptrepo.yaml - APT repository configuration
#
# Structure:
#   repo:      global repo settings
#   defaults:  default values applied to every dist (all fields optional)
#   dists:     per-distribution config; any key here overrides 'defaults'

repo:
  base_dir: /srv/apt/repo
  incoming_dir: /srv/apt/incoming   # default incoming dir for ingest command

# These values are merged into every dist entry.
# Any key can be overridden per dist.
defaults:
  components:
    - main
  architectures:
    - amd64
    - arm64
  sign_with: "0xDEADBEEFCAFEBABE"   # GPG key-id used to sign Release files
  origin: "My Private Repo"
  label:  "My Private Repo"
  # GPG key fingerprints (or long key IDs) whose .changes signatures are accepted.
  # Full 40-char fingerprints are recommended; 16-char long IDs are also accepted.
  # Short 8-char IDs work but are insecure and will produce a warning.
  allowed_signers:
    - "0xCAFEBABEDEADBEEF1234ABCD5678EF901234ABCD"  # build server key

dists:

  # Minimal dist -- inherits everything from defaults
  bookworm:
    description: "Debian 12 (Bookworm) packages"

  # Dist with additional architecture
  jammy:
    description: "Ubuntu 22.04 (Jammy) packages"
    architectures:
      - amd64
      - arm64
      - armhf

  # Dist with multiple components and its own signing key
  noble:
    description: "Ubuntu 24.04 (Noble) packages"
    components:
      - main
      - contrib
    architectures:
      - amd64
    sign_with: "0x1234ABCD5678EF90"   # override the default signing key
    # Override allowed_signers for this dist (e.g. different build server)
    allowed_signers:
      - "0xCAFEBABEDEADBEEF1234ABCD5678EF901234ABCD"
      - "0xABCD1234ABCD1234ABCD1234ABCD1234ABCD1234"

  # Unsigned dist (e.g. for local development)
  testing:
    description: "Internal testing packages"
    sign_with: ~    # null -- disables signing for this dist
    architectures:
      - amd64

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APT Repository</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="custom.css" onerror="this.remove()">
<style>
/* ---------- reset & base ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #21262d;
  --border:    #30363d;
  --text:      #c9d1d9;
  --text-dim:  #6e7681;
  --accent:    #3fb950;
  --accent-dim:#1a4a24;
  --danger:    #f85149;
  --font:      'JetBrains Mono', 'Fira Code', monospace;
  --radius:    4px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ---------- layout ---------- */
header {
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
header h1 {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.04em;
}
header .subtitle {
  color: var(--text-dim);
  font-size: 12px;
}

.toolbar {
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--bg2);
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 160px;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 6px 10px 6px 32px;
  outline: none;
  transition: border-color 0.15s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text-dim); }

/* ---------- multi-select dropdown ---------- */
.ms-wrap {
  position: relative;
  user-select: none;
}
.ms-trigger {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 6px 28px 6px 10px;
  cursor: pointer;
  white-space: nowrap;
  min-width: 120px;
  position: relative;
  transition: border-color 0.15s;
}
.ms-trigger::after {
  content: '▾';
  position: absolute;
  right: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 11px;
}
.ms-trigger:hover, .ms-wrap.open .ms-trigger { border-color: var(--accent); }
.ms-panel {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-width: 160px;
  max-height: 260px;
  overflow-y: auto;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.ms-wrap.open .ms-panel { display: block; }
.ms-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  cursor: pointer;
  transition: background 0.1s;
}
.ms-option:hover { background: var(--bg3); }
.ms-option input[type=checkbox] {
  accent-color: var(--accent);
  width: 13px; height: 13px;
  cursor: pointer;
}
.ms-option label { cursor: pointer; flex: 1; }

/* ---------- status bar ---------- */
#status {
  padding: 8px 28px;
  font-size: 11px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  min-height: 30px;
  display: flex;
  align-items: center;
  gap: 16px;
}
#status .pill {
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 20px;
  padding: 1px 8px;
  font-size: 11px;
}
#status .err { color: var(--danger); }

/* ---------- table ---------- */
.table-wrap {
  overflow-x: auto;
  padding: 0 28px 28px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
}
th {
  text-align: left;
  padding: 8px 12px;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
}
th:hover { color: var(--text); }
th .sort-arrow { margin-left: 4px; opacity: 0.4; }
th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg2); }

.pkg-name { color: var(--accent); font-weight: 500; }
.pkg-ver  { color: var(--text-dim); }
.pkg-arch {
  display: inline-block;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  font-size: 11px;
  color: var(--text-dim);
}
.pkg-size { color: var(--text-dim); white-space: nowrap; }
.pkg-desc { color: var(--text); max-width: 380px; }
.pkg-comp {
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.7;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 32px; margin-bottom: 12px; }

/* ---------- highlight match ---------- */
mark {
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 1px;
}

/* ---------- scrollbar ---------- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<header>
  <h1>⬡ APT Repository</h1>
  <span class="subtitle" id="header-sub">Loading…</span>
</header>

<div class="toolbar">
  <div class="ms-wrap" id="ms-dist">
    <div class="ms-trigger" id="ms-dist-trigger">Dists</div>
    <div class="ms-panel" id="ms-dist-panel"></div>
  </div>
  <div class="ms-wrap" id="ms-comp">
    <div class="ms-trigger" id="ms-comp-trigger">Components</div>
    <div class="ms-panel" id="ms-comp-panel"></div>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Filter packages…" autocomplete="off" spellcheck="false">
  </div>
</div>

<div id="status">
  <span id="status-text">Select a distribution to begin.</span>
</div>

<div class="table-wrap">
  <table id="pkg-table">
    <thead>
      <tr>
        <th data-col="Package" class="sorted">Package <span class="sort-arrow">↑</span></th>
        <th data-col="Version">Version <span class="sort-arrow">↕</span></th>
        <th data-col="Architecture">Arch <span class="sort-arrow">↕</span></th>
        <th data-col="Size">Size <span class="sort-arrow">↕</span></th>
        <th data-col="Description">Description <span class="sort-arrow">↕</span></th>
        <th data-col="_component">Component <span class="sort-arrow">↕</span></th>
        <th data-col="_dist">Dist <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="pkg-body"></tbody>
  </table>
  <div class="empty-state" id="empty-state" style="display:none">
    <div class="icon">◫</div>
    <div id="empty-msg">No packages match your filter.</div>
  </div>
</div>

<script>
// ─── Packages file parser ─────────────────────────────────────────────────────
function parsePackages(text) {
  return text.split(/\n\n+/).flatMap(stanza => {
    stanza = stanza.trim();
    if (!stanza) return [];
    const pkg = {};
    let lastKey = null;
    for (const line of stanza.split('\n')) {
      if (line.startsWith(' ') || line.startsWith('\t')) {
        if (lastKey) pkg[lastKey] = (pkg[lastKey] || '') + '\n' + line.trim();
      } else {
        const colon = line.indexOf(': ');
        if (colon === -1) continue;
        lastKey = line.slice(0, colon);
        pkg[lastKey] = line.slice(colon + 2);
      }
    }
    return pkg.Package ? [pkg] : [];
  });
}

// ─── Size formatter ───────────────────────────────────────────────────────────
function fmtSize(bytes) {
  if (!bytes) return '—';
  const n = parseInt(bytes, 10);
  if (isNaN(n)) return '—';
  if (n >= 1048576) return (n / 1048576).toFixed(1) + ' MiB';
  if (n >= 1024)    return (n / 1024).toFixed(0)    + ' KiB';
  return n + ' B';
}

// ─── Highlight search term in text ───────────────────────────────────────────
function highlight(text, term) {
  if (!term) return escHtml(text);
  const idx = text.toLowerCase().indexOf(term.toLowerCase());
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx))
    + '<mark>' + escHtml(text.slice(idx, idx + term.length)) + '</mark>'
    + escHtml(text.slice(idx + term.length));
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Multi-select dropdown ────────────────────────────────────────────────────
function buildMultiSelect(wrapId, triggerId, panelId, items, placeholder, onChange) {
  const wrap    = document.getElementById(wrapId);
  const trigger = document.getElementById(triggerId);
  const panel   = document.getElementById(panelId);

  panel.innerHTML = '';
  const state = {};
  items.forEach(item => {
    state[item] = true;
    const opt = document.createElement('div');
    opt.className = 'ms-option';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id   = `${panelId}-${item}`;
    cb.checked = true;
    const lbl = document.createElement('label');
    lbl.htmlFor = cb.id;
    lbl.textContent = item;
    cb.addEventListener('change', () => {
      state[item] = cb.checked;
      updateTrigger();
      onChange(state);
    });
    opt.append(cb, lbl);
    panel.appendChild(opt);
  });

  function updateTrigger() {
    const selected = Object.keys(state).filter(k => state[k]);
    trigger.textContent = selected.length === items.length
      ? placeholder
      : selected.length === 0
        ? `${placeholder}: none`
        : selected.join(', ');
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    wrap.classList.toggle('open');
  });

  return {
    getSelected: () => Object.keys(state).filter(k => state[k]),
    setItems(newItems) {
      items = newItems;
      newItems.forEach(item => { if (!(item in state)) state[item] = true; });
      Object.keys(state).forEach(k => { if (!newItems.includes(k)) delete state[k]; });
      // re-render checkboxes
      panel.innerHTML = '';
      newItems.forEach(item => {
        const opt = document.createElement('div');
        opt.className = 'ms-option';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.id = `${panelId}-${item}`; cb.checked = !!state[item];
        const lbl = document.createElement('label');
        lbl.htmlFor = cb.id; lbl.textContent = item;
        cb.addEventListener('change', () => {
          state[item] = cb.checked; updateTrigger(); onChange(state);
        });
        opt.append(cb, lbl);
        panel.appendChild(opt);
      });
      updateTrigger();
    }
  };
}

// close dropdowns on outside click
document.addEventListener('click', () => {
  document.querySelectorAll('.ms-wrap.open').forEach(el => el.classList.remove('open'));
});

// ─── Sorting state ────────────────────────────────────────────────────────────
let sortCol = 'Package', sortAsc = true;

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('th[data-col]').forEach(t => {
      t.classList.remove('sorted');
      t.querySelector('.sort-arrow').textContent = '↕';
    });
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
    renderTable();
  });
});

// ─── App state ────────────────────────────────────────────────────────────────
let allPackages = [];   // all loaded pkg objects
let repoMeta   = {};   // from repo.json
let distCtrl, compCtrl;
let loading = false;

function setStatus(msg, count) {
  document.getElementById('status-text').textContent = msg;
  const pill = document.getElementById('status-pill');
  if (count !== undefined) {
    if (!pill) {
      const p = document.createElement('span');
      p.className = 'pill'; p.id = 'status-pill';
      document.getElementById('status').appendChild(p);
    }
    document.getElementById('status-pill').textContent = `${count} packages`;
  } else if (pill) {
    pill.remove();
  }
}

// ─── Fetch + parse Packages files ────────────────────────────────────────────
async function loadPackages(selectedDists, selectedComps) {
  if (loading) return;
  loading = true;
  allPackages = [];
  setStatus('Loading…');

  const base = document.querySelector('script[data-base]')?.dataset.base
    ?? new URL('.', document.baseURI).pathname.replace(/[/]$/, '');

  const fetches = [];
  for (const dist of selectedDists) {
    const distInfo = repoMeta.dists[dist];
    if (!distInfo) continue;
    for (const comp of selectedComps) {
      if (!distInfo.components.includes(comp)) continue;
      for (const arch of distInfo.architectures) {
        const url = `${base}/dists/${dist}/${comp}/binary-${arch}/Packages`;
        fetches.push(
          fetch(url)
            .then(r => r.ok ? r.text() : Promise.reject(r.status))
            .then(text => {
              const pkgs = parsePackages(text);
              pkgs.forEach(p => { p._dist = dist; p._component = comp; });
              return pkgs;
            })
            .catch(() => [])   // missing Packages file is not an error
        );
      }
    }
  }

  const results = await Promise.all(fetches);

  // Deduplicate: same Package+Version+Arch across arches/components
  // Keep all distinct (package, version, arch, dist, component) combos
  const seen = new Set();
  results.flat().forEach(pkg => {
    const key = `${pkg.Package}|${pkg.Version}|${pkg.Architecture}|${pkg._dist}|${pkg._component}`;
    if (!seen.has(key)) { seen.add(key); allPackages.push(pkg); }
  });

  loading = false;
  renderTable();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderTable() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  const body = document.getElementById('pkg-body');
  const empty = document.getElementById('empty-state');
  const emptyMsg = document.getElementById('empty-msg');

  let filtered = allPackages;
  if (term) {
    filtered = filtered.filter(p =>
      (p.Package       || '').toLowerCase().includes(term) ||
      (p.Description   || '').toLowerCase().split('\n')[0].includes(term)
    );
  }

  // Sort
  filtered.sort((a, b) => {
    let va = a[sortCol] || '';
    let vb = b[sortCol] || '';
    if (sortCol === 'Size') {
      va = parseInt(va, 10) || 0;
      vb = parseInt(vb, 10) || 0;
      return sortAsc ? va - vb : vb - va;
    }
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  if (filtered.length === 0) {
    body.innerHTML = '';
    empty.style.display = '';
    emptyMsg.textContent = allPackages.length === 0
      ? 'Select a distribution to load packages.'
      : 'No packages match your filter.';
    setStatus(allPackages.length === 0 ? 'No packages loaded.' : `0 of ${allPackages.length} packages`);
    return;
  }

  empty.style.display = 'none';
  const termRaw = document.getElementById('search').value.trim();

  body.innerHTML = filtered.map(p => {
    const shortDesc = (p.Description || '').split('\n')[0];
    return `<tr>
      <td><span class="pkg-name">${highlight(p.Package || '', termRaw)}</span></td>
      <td><span class="pkg-ver">${escHtml(p.Version || '')}</span></td>
      <td><span class="pkg-arch">${escHtml(p.Architecture || '')}</span></td>
      <td><span class="pkg-size">${fmtSize(p.Size)}</span></td>
      <td><span class="pkg-desc">${highlight(shortDesc, termRaw)}</span></td>
      <td><span class="pkg-comp">${escHtml(p._component || '')}</span></td>
      <td><span class="pkg-comp">${escHtml(p._dist || '')}</span></td>
    </tr>`;
  }).join('');

  const shown = filtered.length;
  const total = allPackages.length;
  setStatus(
    shown === total ? `${total} packages` : `${shown} of ${total} packages`,
    shown
  );
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // Derive base path from the script tag or document location
  const base = new URL('.', document.baseURI).href.replace(/[/]$/, '');

  let meta;
  try {
    const r = await fetch(`${base}/repo.json`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    meta = await r.json();
  } catch (e) {
    setStatus(`Failed to load repo.json: ${e.message}`);
    document.getElementById('header-sub').textContent = 'error loading repository metadata';
    return;
  }

  repoMeta = meta;
  const distNames = Object.keys(meta.dists);
  const allComps  = [...new Set(distNames.flatMap(d => meta.dists[d].components))].sort();

  document.getElementById('header-sub').textContent =
    `${distNames.length} dist${distNames.length !== 1 ? 's' : ''}`;

  // Build dist multi-select
  distCtrl = buildMultiSelect(
    'ms-dist', 'ms-dist-trigger', 'ms-dist-panel',
    distNames, 'Dists',
    () => onFilterChange()
  );

  // Build component multi-select (union of all components across dists)
  compCtrl = buildMultiSelect(
    'ms-comp', 'ms-comp-trigger', 'ms-comp-panel',
    allComps, 'Components',
    () => onFilterChange()
  );

  onFilterChange();
}

function onFilterChange() {
  const selDists = distCtrl.getSelected();
  const selComps = compCtrl.getSelected();
  if (selDists.length === 0 || selComps.length === 0) {
    allPackages = [];
    renderTable();
    setStatus('Nothing selected.');
    return;
  }
  loadPackages(selDists, selComps);
}

document.getElementById('search').addEventListener('input', renderTable);

init();
</script>
</body>
</html>

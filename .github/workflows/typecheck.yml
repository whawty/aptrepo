name: typecheck

on:
  push:
    branches: [master]
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # The code uses PEP 604 unions evaluated at runtime, so 3.10 is the
          # minimum. Pin it here so the type check matches the support floor.
          python-version: "3.10"

      - name: Install type-checking dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run mypy
        run: python -m mypy aptrepo.py
